<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Assignment</title>

<style>

body {
    font-family: Arial, sans-serif;
    background-color: #E6D6FF;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transition: 0.3s;
}

.container {
    background: white;
    padding: 35px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

h1 {
    color: #6A0DAD;
}

button {
    margin-top: 20px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background-color: #7B2CBF;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #5A189A;
}

/* Dark mode styles */

.dark-mode {
    background-color: #1e1e1e;
    color: white;
}

.dark-mode .container {
    background-color: #2b2b2b;
}

</style>
</head>

<body>

<div class="container">

<h1>DevOps Assignment</h1>

<p><b>Name:</b> Irine Anna Johnson</p>
<p><b>Roll Number:</b> 2023BCS0097</p>

<button onclick="toggleMode()">Toggle Dark Mode</button>

</div>

<script>

function toggleMode() {
    document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
